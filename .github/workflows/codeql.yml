name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1" # weekly Monday sweep catches newly-published queries

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    # Code scanning needs GitHub Advanced Security, which is only free on public
    # repos; skip cleanly while the repo is private so CI stays green. Activates
    # automatically if the repo is made public.
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: python

      - uses: github/codeql-action/analyze@v3
