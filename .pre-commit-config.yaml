repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [--fix]
        #files: ^(src/pya3eda/|tests/)
      - id: ruff-format
        #files: ^(src/pya3eda/|tests/)

  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args: [src/, -v, --fail-under=100]
        pass_filenames: false

  # mypy runs against the project's own env (config in pyproject [tool.mypy]).
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
